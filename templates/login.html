<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | PhishCatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}
body{
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.login-box{
background:#111827;
padding:40px;
width:400px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}
h2{
color:white;
text-align:center;
margin-bottom:25px;
}
input{
width:100%;
padding:14px;
margin-bottom:18px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
</style>
</head>
<body>
<div class="login-box">
<h2>PhishCatcher Login</h2>
<form method="POST">
<input
type="text" name="username" placeholder="User ID" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">
Login
</button>
</form>
</div>
</body>
</html>
